    <!-- 5. 獨立的 Firebase 模組：只負責讀取全域金鑰 (唯讀最安全) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.initFirebaseSystem = async () => {
            const firebaseConfig = {
                apiKey: "AIzaSyDUSNGzl3nOeNnlF50wIWISx0JFWJGZB-Q",
                authDomain: "k14-brandbase-ai-branding.firebaseapp.com",
                projectId: "k14-brandbase-ai-branding",
                storageBucket: "k14-brandbase-ai-branding.firebasestorage.app",
                messagingSenderId: "1064629590271",
                appId: "1:1064629590271:web:c23cf03b02effeee4914ca",
                measurementId: "G-9MH2GCM1R0"
            };
            const appId = "k14-brandbase-ai-branding"; 

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.warn("Firebase 匿名登入失敗，請確認是否已至後台開啟", err);
            }
            return { db, appId };
        };

        window.FirebaseManager = {
            getGlobalKey: async (db, appId) => {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'global_key');
                    const snap = await getDoc(docRef);
                    return snap.exists() ? snap.data().key : null;
                } catch (e) {
                    console.warn("無法讀取 Firestore，可能是權限不足。", e);
                    return null;
                }
            }
        };
    </script>

        /* 隱藏預設滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 自定義優雅滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        
        /* 動畫設定 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out; }

        .animate-slideRight { animation: slideRight 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* 防止手機長按選取 UI 元素 */
        .no-select { -webkit-user-select: none; user-select: none; }

                    return updated;
                });
                if (currentId === id) {
                    setCurrentId(null);
                    setFormData(EMPTY_DATA);
                }
            };

            const saveToDatabase = (isNew = false) => {
                if (!formData.brandName) return;
                
                setDatabase(prev => {
                    let updated;
                    const newId = Date.now();
                    
                    if (currentId && !isNew) {
                        updated = prev.map(item => item.id === currentId ? { ...formData, id: currentId } : item);
                    } else {
                        setCurrentId(newId);
                        updated = [{ ...formData, id: newId }, ...prev];
                    }
                    localStorage.setItem('tony_brand_database', JSON.stringify(updated));
                    return updated;
                });
                setShowSetup(false);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) setUploadFile(file);
            };

            const handleTranslateContent = async () => {
                if (!globalApiKey) {
                    setSearchError(lang === 'zh-TW' ? '請聯繫站長確認全域 AI 金鑰是否設定正確。' : 'Please contact admin to check global AI Key.');
                    return;
                }
                
                if (!formData.brandName && !formData.features && !formData.targetAudience) {
                    setSearchError(lang === 'zh-TW' ? '表單是空的，沒有內容可以翻譯。' : 'The form is empty, nothing to translate.');
                    return;
                }

                setIsTranslating(true);
                setSearchError('');
                
                try {
                    const targetLang = lang === 'zh-TW' ? 'Traditional Chinese (繁體中文)' : 'English';
                    const payload = {
                        contents: [{
                            parts: [{
                                text: `You are a professional marketing translator. Translate the values of the following JSON object into ${targetLang}. 
                                Keep the exact same JSON keys (brandName, productName, features, ingredients, targetAudience, occasion, priceSpec, tone, forbiddenWords, cta). 
                                Return ONLY the valid JSON object without any markdown like \`\`\`json.\n\n${JSON.stringify(formData)}`
                            }]
                        }]
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${globalApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error('Translation API Request Failed');
                    }

                    const data = await response.json();
                    let textResult = data.candidates[0].content.parts[0].text;
                    
                    textResult = textResult.replace(/`{3}json/gi, '').replace(/`{3}/g, '').trim();
                    const startIndex = textResult.indexOf('{');
                    const endIndex = textResult.lastIndexOf('}');
                    if (startIndex !== -1 && endIndex !== -1) {
                        textResult = textResult.substring(startIndex, endIndex + 1);
                    }
                    
                    const parsedData = JSON.parse(textResult);
                    setFormData(prev => ({ ...prev, ...parsedData }));
                    
                } catch (err) {
                    setSearchError(lang === 'zh-TW' ? `翻譯發生錯誤：${err.message}` : `Translation Error: ${err.message}`);
                    console.error(err);
                } finally {
                    setIsTranslating(false);
                }
            };

            const handleAiGenerate = async () => {
                if (!globalApiKey) {
                    setSearchError(lang === 'zh-TW' ? '系統尚未就緒，請稍後再試或聯繫站長。' : 'System not ready. Please try again later.');
                    return;
                }

                if (aiMode === 'search' && !searchName.trim()) {
                    setSearchError(lang === 'zh-TW' ? '請至少輸入品牌或店家名稱' : 'Please enter at least the brand or store name');
                    return;
                }

                if (aiMode === 'upload') {
                    if (!uploadFile) {
                        setSearchError(lang === 'zh-TW' ? '請先上傳一份品牌指南或相關檔案' : 'Please upload a brand guide or related file first');
                        return;
                    }
                    const fileType = uploadFile.name.split('.').pop().toLowerCase();
                    const mimeType = uploadFile.type;
                    if (fileType !== 'txt' && fileType !== 'docx' && !mimeType.startsWith('image/') && mimeType !== 'application/pdf') {
                        setSearchError(lang === 'zh-TW' ? '不支援的檔案格式，請上傳 TXT, DOCX, PDF 或圖檔。' : 'Unsupported format. Upload TXT, DOCX, PDF, or Image.');
                        return;
                    }
                }

                setIsSearching(true);
                setSearchError('');

                try {
                    let parts = [];
                    const languageInstruction = lang === 'zh-TW' 
                        ? '請根據內容將對應的「繁體中文」填入值中' 
                        : 'Please fill in the corresponding values in "English" based on the context';

                    const systemPrompt = `你是一個專業的品牌行銷顧問。請根據提供的資訊，為這家店規劃一份行銷品牌設定。如果資訊不足，請依據該產業特性進行「符合邏輯且高質感」的行銷推斷。
請務必以嚴格的 JSON 格式回傳，不要加上 \`\`\`json 等任何 Markdown 標記，直接回傳 JSON 物件本身。必須包含以下 10 個 keys（${languageInstruction}）：
- brandName
- productName 
- features 
- ingredients 
- targetAudience 
- occasion 
- priceSpec 
- tone 
- forbiddenWords 
- cta `;

                    let payload = { contents: [] };

                    if (aiMode === 'search') {
                        parts.push({ text: `【任務】：利用網路搜尋這家店的真實資訊。\n店名：${searchName}\n地址/區域：${searchAddress}\n\n${systemPrompt}` });
                        payload.contents.push({ parts });
                        payload.tools = [{ google_search: {} }]; 
                    } else {
                        const fileType = uploadFile.name.split('.').pop().toLowerCase();
                        const mimeType = uploadFile.type;

                        if (fileType === 'txt') {
                            const text = await uploadFile.text();
                            parts.push({ text: `【品牌指南文件內容】：\n${text}\n\n${systemPrompt}` });
                        } else if (fileType === 'docx') {
                            const arrayBuffer = await uploadFile.arrayBuffer();
                            const result = await window.mammoth.extractRawText({ arrayBuffer });
                            parts.push({ text: `【品牌指南文件內容】：\n${result.value}\n\n${systemPrompt}` });
                        } else if (mimeType.startsWith('image/') || mimeType === 'application/pdf') {
                            const base64 = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = () => resolve(reader.result.split(',')[1]);
                                reader.readAsDataURL(uploadFile);
                            });
                            parts.push({ text: `【任務】：請閱讀分析這份品牌指南（圖片或PDF文件），並結合以下要求：\n\n${systemPrompt}` });
                            parts.push({ inlineData: { mimeType, data: base64 } });
                        }
                        payload.contents.push({ parts });
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${globalApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || (lang === 'zh-TW' ? 'API 請求失敗' : 'API Request Failed'));
                    }

                    const data = await response.json();
                    let textResult = data.candidates[0].content.parts[0].text;
                    
                    textResult = textResult.replace(/`{3}json/gi, '').replace(/`{3}/g, '').trim();
                    const startIndex = textResult.indexOf('{');
                    const endIndex = textResult.lastIndexOf('}');
                    if (startIndex !== -1 && endIndex !== -1) {
                        textResult = textResult.substring(startIndex, endIndex + 1);
                    }
                    
                    const parsedData = JSON.parse(textResult);
                    const newId = Date.now();
                    
                    setFormData(prev => ({ ...prev, ...parsedData }));
                    setCurrentId(newId);
                    
                    setDatabase(prev => {
                        const updated = [{ ...parsedData, id: newId }, ...prev];
                        localStorage.setItem('tony_brand_database', JSON.stringify(updated));
                        return updated;
                    });

                } catch (err) {
                    setSearchError(lang === 'zh-TW' ? `發生錯誤：${err.message}` : `Error: ${err.message}`);
                    console.error(err);
                } finally {
                    setIsSearching(false);
                }
            };

            const SidebarContent = () => (
                <div className="p-4">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">{t.sidebarTitle}</h3>
                    <div className="space-y-6">
                        {MODULES.map((module) => (
                            <div key={module.id} className="relative">
                                <div className={`flex items-center gap-2 mb-2 ${activeModuleId === module.id ? 'text-amber-600' : 'text-slate-600'}`}>
                                    <Icon name={module.iconName} size={20} />
                                    <span className="font-bold text-sm">{module.title}</span>
                                </div>
                                <div className="ml-2 pl-4 border-l-2 border-slate-100 space-y-1">
                                    {module.tasks.map((task) => (
                                        <button
                                            key={task.id}
                                            onClick={() => {
                                                setActiveModuleId(module.id);
                                                setActiveTaskId(task.id);
                                                setShowSetup(false);
                                                setIsMobileMenuOpen(false); 
                                            }}
                                            className={`w-full text-left px-3 py-2.5 rounded-md text-sm flex items-center gap-2 transition-all
                                                ${activeTaskId === task.id && activeModuleId === module.id
                                                    ? 'bg-amber-50 text-amber-700 font-medium border-r-2 border-amber-500' 
                                                    : 'text-slate-500 hover:bg-slate-50'
                                                }`}
                                        >
                                            <Icon name={task.iconName} size={16} />
                                            {task.title}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-[100dvh] pt-6 sm:pt-8 bg-slate-50 font-sans text-slate-800">
                    
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 px-3 md:px-6 py-3 flex justify-between items-center shadow-sm z-10 relative flex-shrink-0 no-select w-full overflow-hidden">
                        <div className="flex items-center gap-1 sm:gap-2 md:gap-3 flex-1 min-w-0">
                            <button 
                                onClick={() => setIsMobileMenuOpen(true)}
                                className="md:hidden p-1.5 text-slate-500 hover:bg-slate-100 rounded-lg active:bg-slate-200 transition-colors flex-shrink-0"
                            >
                                <Icon name="menu" size={24} />
                            </button>

                            <img 
                                src="https://i.postimg.cc/4NTG1KrT/zhi-shang-zhanlogo-ol-quan-ying-wen-lan-se.png" 
                                alt="BrandBase Logo" 
                                className="h-7 sm:h-9 md:h-12 w-auto object-contain pointer-events-none flex-shrink-0"
                            />
                            <div className="hidden sm:block truncate ml-1">
                                <h1 className="text-base md:text-xl font-bold text-slate-800 truncate">BrandBase</h1>
                                <p className="text-[10px] md:text-xs text-slate-500 hidden md:block truncate">{t.appSubtitle}</p>
                            </div>
                        </div>
                        <div className="flex gap-1.5 sm:gap-2 flex-shrink-0 ml-2">
                            <button
                                onClick={() => setLang(lang === 'zh-TW' ? 'en' : 'zh-TW')}
                                className="p-2 md:px-3 md:py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors flex items-center justify-center gap-1 font-bold text-sm"
                                title={lang === 'zh-TW' ? 'Switch to English' : '切換至繁體中文'}
                            >
                                <Icon name="globe" size={18} />
                                <span className="hidden md:inline">{lang === 'zh-TW' ? 'EN' : '中'}</span>
                            </button>

                            <button 
                                onClick={() => setShowAbout(true)}
                                className="p-2 md:px-3 md:py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors flex items-center justify-center gap-2"
                                title="關於講師與版權"
                            >
                                <Icon name="info" size={18} />
                                <span className="hidden md:inline text-sm font-bold">{t.btnAbout}</span>
                            </button>
                            <button 
                                onClick={() => setShowSetup(!showSetup)}
                                className={`p-2 md:px-4 md:py-2 rounded-lg flex items-center justify-center gap-2 transition-colors ${showSetup ? 'bg-slate-800 text-white shadow-sm' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}
                                title={showSetup ? t.btnSettings : t.btnEdit}
                            >
                                <Icon name="settings" size={18} />
                                <span className="hidden md:inline">{showSetup ? t.btnSettings : t.btnEdit}</span>
                            </button>
                        </div>
                    </header>

                    {showAbout && <AboutModal onClose={() => setShowAbout(false)} lang={lang} />}

                    <div className="flex flex-1 overflow-hidden relative">
                        
                        <aside className="w-64 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0 hidden md:block no-select">
                            <SidebarContent />
                        </aside>

                        {/* Mobile Menu Drawer */}
                        {isMobileMenuOpen && (
                            <div className="fixed inset-0 z-50 md:hidden flex no-select">
                                <div 
                                    className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm animate-fadeIn"
                                    onClick={() => setIsMobileMenuOpen(false)}
                                ></div>
                                <div className="relative w-[75%] max-w-sm bg-white shadow-2xl animate-slideRight flex flex-col h-full">
                                     <div className="p-4 flex justify-between items-center border-b border-slate-100 bg-slate-50 flex-shrink-0">
                                        <div className="flex items-center gap-2">
                                            <Icon name="menu" size={18} className="text-slate-500"/>
                                            <span className="font-bold text-slate-700">{t.mobileMenuTitle}</span>
                                        </div>
                                        <button 
                                            onClick={() => setIsMobileMenuOpen(false)}
                                            className="p-1.5 rounded-full hover:bg-slate-200 text-slate-500 transition-colors"
                                        >
                                            <Icon name="x" size={20} />
                                        </button>
                                     </div>
                                     <div className="flex-1 overflow-y-auto pb-8">
                                        <SidebarContent />
                                     </div>
                                </div>
                            </div>
                        )}

                        <main className="flex-1 flex flex-col md:flex-row overflow-hidden relative w-full">
                            
                            {showSetup ? (
                                <div className="flex-1 overflow-y-auto p-4 sm:p-6 md:p-10 pb-32 bg-slate-50 w-full h-full block custom-scrollbar">
                                    <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 md:p-8">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 no-select">
                                            <div>
                                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                                                    <span className="bg-amber-100 text-amber-600 w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 shadow-sm">1</span>
                                                    {t.setupTitle}
                                                </h2>
                                                <p className="text-slate-500 mt-1 text-sm md:text-base">{t.setupDesc}</p>
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-2 w-full md:w-auto mt-4 md:mt-0">
                                                <button onClick={() => { setFormData(EMPTY_DATA); setCurrentId(null); }} className="flex-1 md:flex-none px-3 py-2 bg-slate-100 text-slate-700 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors border border-slate-200 whitespace-nowrap">
                                                    <Icon name="plus" size={14} className="inline mr-1"/>{t.btnBlank}
                                                </button>
                                                <button onClick={() => fillExample('minshuku')} className="flex-1 md:flex-none px-3 py-2 bg-emerald-50 text-emerald-700 rounded-lg text-xs font-bold hover:bg-emerald-100 transition-colors border border-emerald-200 whitespace-nowrap">
                                                    {t.btnExMinshuku}
                                                </button>
                                                <button onClick={() => fillExample('restaurant')} className="flex-1 md:flex-none px-3 py-2 bg-orange-50 text-orange-700 rounded-lg text-xs font-bold hover:bg-orange-100 transition-colors border border-orange-200 whitespace-nowrap">
                                                    {t.btnExRestaurant}
                                                </button>
                                                <button onClick={() => fillExample('souvenir')} className="flex-1 md:flex-none px-3 py-2 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold hover:bg-rose-100 transition-colors border border-rose-200 whitespace-nowrap">
                                                    {t.btnExSouvenir}
                                                </button>
                                                <button onClick={() => fillExample('creative')} className="flex-1 md:flex-none px-3 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors border border-indigo-200 whitespace-nowrap">
                                                    {t.btnExCreative}
                                                </button>
                                            </div>
                                        </div>

                                        {database.length > 0 && (
                                            <div className="mb-8 p-4 bg-white rounded-xl border border-indigo-100 shadow-sm relative z-10 no-select">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <Icon name="database" size={18} className="text-indigo-600" />
                                                    <h3 className="font-bold text-indigo-900 text-sm">{t.dbTitle} ({database.length})</h3>
                                                </div>
                                                <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar pr-2 pb-1">
                                                    {database.map(item => (
                                                        <div 
                                                            key={item.id} 
                                                            onClick={() => { setFormData(item); setCurrentId(item.id); }}
                                                            className={`flex items-center gap-1 pl-3 pr-1 py-1.5 rounded-lg border text-sm transition-all cursor-pointer shadow-sm
                                                                ${currentId === item.id 
                                                                    ? 'bg-indigo-50 border-indigo-300 text-indigo-700 font-bold' 
                                                                    : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100 hover:border-slate-300'
                                                                }`}
                                                        >
                                                            <span>{item.brandName || t.unnamedStore}</span>
                                                            <button 
                                                                onClick={(e) => deleteFromDatabase(item.id, e)} 
                                                                className={`ml-1 p-1 rounded-full transition-colors ${currentId === item.id ? 'text-indigo-400 hover:bg-indigo-200 hover:text-indigo-800' : 'text-slate-400 hover:bg-red-100 hover:text-red-600'}`}
                                                                title="Delete"
                                                            >
                                                                <Icon name="x" size={14} />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="mb-8 p-5 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl border border-blue-100 shadow-sm relative overflow-hidden">
                                            <div className="absolute -right-4 -top-4 opacity-10 pointer-events-none">
                                                <Icon name="bot" size={100} />
                                            </div>
                                            
                                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4 relative z-10 no-select">
                                                <div className="flex items-center gap-2">
                                                    <Icon name="sparkles" size={20} className="text-blue-600" />
                                                    <h3 className="font-bold text-blue-900">{t.aiTitle}</h3>
                                                    <span className="text-[10px] bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full font-mono">Gemini 3.5 Flash</span>
                                                </div>
                                                
                                                <div className="flex bg-blue-200/50 p-1 rounded-lg w-fit">
                                                    <button 
                                                        onClick={() => setAiMode('search')} 
                                                        disabled={isSearching}
                                                        className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all disabled:opacity-50 ${aiMode === 'search' ? 'bg-white text-blue-800 shadow-sm' : 'text-blue-600 hover:text-blue-800'}`}
                                                    >
                                                        <Icon name="globe" size={14} className="inline mr-1" /> {t.aiTabSearch}
                                                    </button>
                                                    <button 
                                                        onClick={() => setAiMode('upload')} 
                                                        disabled={isSearching}
                                                        className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all disabled:opacity-50 ${aiMode === 'upload' ? 'bg-white text-blue-800 shadow-sm' : 'text-blue-600 hover:text-blue-800'}`}
                                                    >
                                                        <Icon name="upload-cloud" size={14} className="inline mr-1" /> {t.aiTabUpload}
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <p className="text-sm text-blue-700 mb-5 relative z-10 no-select">
                                                {aiMode === 'search' ? t.aiDescSearch : t.aiDescUpload}
                                            </p>
                                            
                                            <div className="mb-4 relative z-10">
                                                {aiMode === 'search' ? (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-bold text-blue-800 mb-1 no-select">{t.aiLabelName}</label>
                                                            <input type="text" value={searchName} disabled={isSearching} onChange={e => setSearchName(e.target.value)} placeholder={t.aiPhName} className="w-full px-3 py-2 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-inner disabled:bg-slate-100 transition-colors" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-blue-800 mb-1 no-select">{t.aiLabelAddress}</label>
                                                            <input type="text" value={searchAddress} disabled={isSearching} onChange={e => setSearchAddress(e.target.value)} placeholder={t.aiPhAddress} className="w-full px-3 py-2 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-inner disabled:bg-slate-100 transition-colors" />
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className={`border-2 border-dashed rounded-xl p-6 text-center bg-white/50 transition-colors ${isSearching ? 'border-slate-300 opacity-50' : 'border-blue-300 hover:bg-white'}`}>
                                                        <input type="file" id="file-upload" className="hidden" accept=".txt,.pdf,.docx,image/*" disabled={isSearching} onChange={handleFileChange} />
                                                        <label htmlFor="file-upload" className={`flex flex-col items-center justify-center w-full h-full ${isSearching ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-3 ${isSearching ? 'bg-slate-200 text-slate-400' : 'bg-blue-100 text-blue-600'}`}>
                                                                <Icon name="file-text" size={24} />
                                                            </div>
                                                            <span className={`text-sm font-bold mb-1 no-select ${isSearching ? 'text-slate-500' : 'text-blue-800'}`}>{t.aiUploadTitle}</span>
                                                            <span className={`text-xs no-select ${isSearching ? 'text-slate-400' : 'text-blue-500'}`}>{t.aiUploadDesc}</span>
                                                            {uploadFile && (
                                                                <div className="mt-4 px-4 py-2 bg-blue-100 border border-blue-200 text-blue-800 rounded-lg text-sm font-mono flex items-center gap-2 max-w-full overflow-hidden shadow-sm">
                                                                    <Icon name="check-circle" size={16} className="text-green-600 flex-shrink-0" />
                                                                    <span className="truncate">{uploadFile.name}</span>
                                                                </div>
                                                            )}
                                                        </label>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="p-4 bg-white rounded-xl border border-blue-100 shadow-sm relative z-10">
                                                <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                                                    <div className="flex-1 w-full no-select">
                                                        {isKeyLoaded ? (
                                                            <div className="text-sm font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 p-2.5 rounded-lg flex items-center gap-2 shadow-inner">
                                                                <Icon name="check-circle" size={18} />
                                                                {lang === 'zh-TW' ? '全域 AI 金鑰已由 SMEBig 提供，一切準備就緒，GO！' : 'Global AI Key provided by SMEBig, all set to GO!'}
                                                            </div>
                                                        ) : (
                                                            <div className="text-sm font-bold text-amber-700 bg-amber-50 border border-amber-200 p-2.5 rounded-lg flex items-center gap-2 shadow-inner">
                                                                <Icon name="loader" size={18} className="animate-spin" />
                                                                {lang === 'zh-TW' ? '正在連線取得授權中...' : 'Connecting to authorization...'}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button 
                                                        onClick={handleAiGenerate} 
                                                        disabled={isSearching || !isKeyLoaded}
                                                        className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed shadow-md active:scale-95 no-select"
                                                    >
                                                        {isSearching ? <Icon name="loader" className="animate-spin" size={18} /> : <Icon name="bot" size={18} />}
                                                        {isSearching ? t.aiBtnProcessing : t.aiBtnGenerate}
                                                    </button>
                                                </div>
                                                {searchError && (
                                                    <div className="absolute -bottom-10 left-0 right-0 animate-slideUp z-20">
                                                        <div className="text-xs text-red-600 flex items-center gap-2 bg-red-50/95 backdrop-blur border border-red-200 px-3 py-2 rounded-lg shadow-lg mx-auto w-fit max-w-full">
                                                            <Icon name="alert-circle" size={14} className="flex-shrink-0"/>
                                                            <span className="truncate">{searchError}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <p className="text-xs text-slate-500 mt-4 relative z-10 flex items-center gap-1 no-select">
                                                <Icon name="info" size={12}/> {t.aiInfoTip}
                                            </p>
                                        </div>

                                        <div className="flex items-center gap-4 mb-8 no-select">
                                            <div className="h-px bg-slate-200 flex-1"></div>
                                            <span className="text-xs text-slate-400 font-bold tracking-widest uppercase">{t.dividerManual}</span>
                                            
                                            <button 
                                                onClick={handleTranslateContent}
                                                disabled={isTranslating || !isKeyLoaded}
                                                className="px-3 py-1.5 text-xs font-bold rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-colors border border-indigo-200 flex items-center gap-1 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                                title={lang === 'zh-TW' ? "將下方表單內容交由 AI 翻譯為英文" : "Translate the form content to English/Chinese"}
                                            >
                                                {isTranslating ? <Icon name="loader" size={12} className="animate-spin" /> : <Icon name="languages" size={12} />}
                                                {isTranslating ? t.translatingContent : t.btnTranslateContent}
                                            </button>
                                            
                                            <div className="h-px bg-slate-200 flex-1"></div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {Object.keys(EMPTY_DATA).map((key) => (
                                                <div key={key} className={['features', 'ingredients', 'targetAudience'].includes(key) ? 'md:col-span-2' : ''}>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1 no-select">
                                                        {formLabels[key]}
                                                    </label>
                                                    {['features', 'ingredients', 'targetAudience', 'occasion'].includes(key) ? (
                                                        <textarea
                                                            value={formData[key]}
                                                            disabled={isTranslating || isSearching}
                                                            onChange={(e) => setFormData({...formData, [key]: e.target.value})}
                                                            className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500"
                                                            rows={3}
                                                        ></textarea>
                                                    ) : (
                                                        <input
                                                            type="text"
                                                            value={formData[key]}
                                                            disabled={isTranslating || isSearching}
                                                            onChange={(e) => setFormData({...formData, [key]: e.target.value})}
                                                            className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500"
                                                        />
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-8 flex flex-col md:flex-row justify-end gap-3 no-select">
                                            {currentId && (
                                                <button onClick={() => saveToDatabase(true)} className="w-full md:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                                                    <Icon name="copy" size={18} />
                                                    {t.btnSaveNew}
                                                </button>
                                            )}
                                            <button onClick={() => saveToDatabase(false)} className="w-full md:w-auto bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 transform active:scale-95">
                                                <Icon name="save" size={20} />
                                                {currentId ? t.btnUpdateGen : t.btnSaveGen}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="w-full md:w-1/2 lg:w-[55%] flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50 border-b md:border-b-0 md:border-r border-slate-200 custom-scrollbar">
                                        <div className="max-w-2xl mx-auto pb-6">
                                            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 flex gap-4 items-start shadow-sm no-select">
                                                <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center flex-shrink-0 shadow-sm border border-blue-100">
                                                    <span className="text-2xl">👨‍🏫</span>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-blue-800 text-sm mb-1">{t.coachModeTitle}</h4>
                                                    <p className="text-blue-700 text-sm leading-relaxed">{getCoachTip(activeTaskId, lang)}</p>
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                                                <div className="flex items-center gap-3 mb-4 no-select">
                                                    <div className="p-2.5 bg-amber-100 text-amber-600 rounded-xl shadow-inner">
                                                        <Icon name={activeTask?.iconName} size={20} />
                                                    </div>
                                                    <h2 className="text-xl font-bold text-slate-800">{activeTask?.title}</h2>
                                                </div>
                                                
                                                <div className="space-y-4">
                                                    <div className="p-4 bg-slate-50 rounded-lg border border-slate-100 no-select">
                                                        <div className="flex justify-between items-center mb-3">
                                                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider">{t.loadedDataTitle}</h4>
                                                            <span className="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full flex items-center gap-1 font-bold shadow-sm">
                                                                <Icon name="check-circle" size={10} /> {t.dataSynced}
                                                            </span>
                                                        </div>
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                            <div><span className="text-slate-500">{t.brandLabel}</span> <span className="font-medium text-slate-800">{formData.brandName || <span className="text-slate-300">{t.notFilled}</span>}</span></div>
                                                            <div><span className="text-slate-500">{t.productLabel}</span> <span className="font-medium text-slate-800">{formData.productName || <span className="text-slate-300">{t.notFilled}</span>}</span></div>
                                                        </div>
                                                        <button onClick={() => setShowSetup(true)} className="text-xs text-amber-600 mt-4 hover:text-amber-700 hover:underline flex items-center gap-1 transition-colors bg-amber-50 w-fit px-2 py-1 rounded-md font-medium">
                                                            <Icon name="edit-3" size={12}/> {t.editSource}
                                                        </button>
                                                    </div>
                                                    <p className="text-sm text-slate-600 leading-relaxed no-select">{t.taskDesc}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full md:w-1/2 lg:w-[45%] bg-slate-900 text-slate-100 flex flex-col h-[50vh] md:h-auto shadow-inner flex-shrink-0 md:flex-shrink z-10">
                                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800 no-select z-20">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.6)]"></div>
                                                <span className="font-mono text-sm font-bold tracking-wide">{t.promptGenTitle}</span>
                                            </div>
                                            <button onClick={handleCopy} className={`text-xs px-3.5 py-2 rounded-lg flex items-center gap-1.5 transition-all font-bold shadow-md active:scale-95 ${isCopied ? 'bg-green-600 text-white' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                                                <Icon name={isCopied ? "check-circle" : "copy"} size={14} />
                                                {isCopied ? t.btnCopied : t.btnCopy}
                                            </button>
                                        </div>
                                        
                                        <div className="flex-1 overflow-y-auto p-5 sm:p-6 font-mono text-sm text-slate-300 relative group custom-scrollbar z-10">
                                            {generatedPromptObj ? (
                                                <div className="animate-fadeIn">
                                                    <div className="whitespace-pre-wrap leading-loose">{generatedPromptObj.base}</div>
                                                    <div className="whitespace-pre-wrap text-amber-400 mt-5 font-bold tracking-wide leading-loose bg-slate-800/50 p-4 rounded-xl border border-slate-700">{generatedPromptObj.task}</div>
                                                </div>
                                            ) : (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-500 opacity-50 no-select">
                                                    <Icon name="sparkles" size={48} className="mb-4" />
                                                    <p>{t.promptEmpty}</p>
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-4 bg-slate-800 border-t border-slate-700 flex-shrink-0 z-20 no-select">
                                            <p className="text-xs font-bold text-slate-400 mb-2 flex items-center gap-2">
                                                <Icon name="lightbulb" size={14} className="text-yellow-400"/> {t.usageHelp}
                                            </p>
                                            <ol className="text-xs text-slate-400 space-y-1.5 pl-5 list-decimal font-medium">
                                                <li>{t.usageStep1}</li>
                                                <li>{t.usageStep2}</li>
                                                <li>{t.usageStep3}</li>
                                            </ol>
                                        </div>
                                    </div>
                                </>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
